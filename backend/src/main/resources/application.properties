spring.application.name=volunteer

# ─── MySQL Configuration ─────────────────────────────────────────────────────
# IMPORTANT: hostname is "mysql" (Docker service name), NOT localhost
spring.datasource.url=jdbc:mysql://mysql:3306/micro_volunteer_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connection-timeout=30000

# ─── JPA Configuration ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080