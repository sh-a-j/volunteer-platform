server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── API proxy → forward /api/* calls to Spring Boot backend ───
    # React calls /api/... and nginx forwards to backend container internally
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── React Router fix → always serve index.html ────────────────
    # Without this, refreshing on /events gives nginx 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}